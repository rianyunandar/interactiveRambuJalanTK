<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" width="160" height="180">
  <!-- Tiang -->
  <rect x="72" y="140" width="16" height="36" rx="4" fill="#888"/>
  <rect x="50" y="168" width="60" height="10" rx="5" fill="#666"/>

  <!-- Lingkaran putih dengan border merah -->
  <circle cx="80" cy="75" r="65" fill="white" stroke="#CC0000" stroke-width="8"/>

  <!-- Huruf P biru -->
  <text x="72" y="92" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial Black, sans-serif" font-size="72" font-weight="900"
        fill="#0066CC">P</text>

  <!-- Garis diagonal merah (coret / larangan) -->
  <line x1="25" y1="28" x2="135" y2="122" stroke="#CC0000" stroke-width="14" stroke-linecap="round"/>
</svg>
