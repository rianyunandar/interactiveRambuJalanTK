<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" width="160" height="180">
  <!-- Tiang -->
  <rect x="72" y="140" width="16" height="36" rx="4" fill="#888"/>
  <rect x="50" y="168" width="60" height="10" rx="5" fill="#666"/>

  <!-- Lingkaran putih dengan border merah tebal -->
  <circle cx="80" cy="75" r="65" fill="white" stroke="#CC0000" stroke-width="10"/>

  <!-- Garis horizontal merah di tengah -->
  <rect x="18" y="62" width="124" height="26" rx="13" fill="#CC0000"/>

  <!-- Garis diagonal merah (coret) -->
